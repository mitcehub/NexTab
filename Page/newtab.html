<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0">
  <title>EZ-Page</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="bg-wrap"></div>
  <div id="bg-mask"></div>

  <div id="main-wrap">
    <div id="clock-wrap">
      <div id="clock-time"></div>
      <div id="clock-date"></div>
    </div>

    <div id="search-wrap">
      <div id="search-engine-btn">
        <img id="search-engine-icon" src="icons/engines/google.svg" alt="">
        <svg id="search-engine-arrow" viewBox="0 0 24 24" width="12" height="12">
          <path d="M7 10l5 5 5-5z" fill="currentColor" />
        </svg>
      </div>
      <div id="search-engine-dropdown"></div>
      <form id="search-form" action="" method="GET">
        <input id="search-input" type="text" name="q" placeholder="搜索..." autocomplete="off" autofocus>
        <button id="search-btn" type="submit">
          <svg viewBox="0 0 24 24" width="18" height="18">
            <path
              d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"
              fill="currentColor" />
          </svg>
        </button>
      </form>
    </div>

    <div id="site-wrap">
      <div id="site-grid"></div>
    </div>
  </div>

  <div id="wallpaper-btn" title="壁纸">
    <svg viewBox="0 0 24 24" width="20" height="20">
      <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"
        fill="currentColor" />
    </svg>
  </div>

  <div id="settings-btn" title="设置">
    <svg viewBox="0 0 24 24" width="20" height="20">
      <path
        d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"
        fill="currentColor" />
    </svg>
  </div>

  <div id="context-menu">
    <div class="ctx-item" data-action="edit">编辑</div>
    <div class="ctx-item" data-action="delete">删除</div>
  </div>

  <div id="settings-panel">
    <div id="settings-header">
      <div id="settings-back" class="hidden">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" fill="currentColor"/></svg>
      </div>
      <span id="settings-title">设置</span>
      <div id="settings-close">&times;</div>
    </div>
    <div id="settings-body">

      <div id="settings-page-main" class="settings-page active">
        <div class="settings-group">
          <div class="settings-title">主题套装</div>
          <div class="suite-row">
            <button class="btn-small suite-btn" data-suite="cyberpunk">赛博朋克</button>
            <button class="btn-small suite-btn" data-suite="neumorphism">新拟态</button>
            <button class="btn-small suite-btn" data-suite="glassmorphism">亚克力</button>
            <button class="btn-small suite-btn" data-suite="modern">极简</button>
            <button class="btn-small suite-btn" data-suite="classic">经典</button>
          </div>
        </div>
        <div class="settings-divider"></div>
        <div class="settings-entry" data-page="clock">
          <div class="settings-entry-icon">
            <svg viewBox="0 0 24 24" width="22" height="22"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z" fill="currentColor"/></svg>
          </div>
          <div class="settings-entry-text">
            <span class="settings-entry-title">时钟设置</span>
            <span class="settings-entry-desc">显示、格式、字号、偏移</span>
          </div>
          <svg class="settings-entry-arrow" viewBox="0 0 24 24" width="16" height="16"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z" fill="currentColor"/></svg>
        </div>
        <div class="settings-entry" data-page="search">
          <div class="settings-entry-icon">
            <svg viewBox="0 0 24 24" width="22" height="22"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" fill="currentColor"/></svg>
          </div>
          <div class="settings-entry-text">
            <span class="settings-entry-title">搜索框设置</span>
            <span class="settings-entry-desc">宽度、高度、圆角、透明度</span>
          </div>
          <svg class="settings-entry-arrow" viewBox="0 0 24 24" width="16" height="16"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z" fill="currentColor"/></svg>
        </div>
        <div class="settings-entry" data-page="site">
          <div class="settings-entry-icon">
            <svg viewBox="0 0 24 24" width="22" height="22"><path d="M4 8h4V4H4v4zm6 12h4v-4h-4v4zm-6 0h4v-4H4v4zm0-6h4v-4H4v4zm6 0h4v-4h-4v4zm6-10v4h4V4h-4zm-6 4h4V4h-4v4zm6 6h4v-4h-4v4zm0 6h4v-4h-4v4z" fill="currentColor"/></svg>
          </div>
          <div class="settings-entry-text">
            <span class="settings-entry-title">图标设置</span>
            <span class="settings-entry-desc">大小、圆角、间距、显示名称</span>
          </div>
          <svg class="settings-entry-arrow" viewBox="0 0 24 24" width="16" height="16"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z" fill="currentColor"/></svg>
        </div>
        <div class="settings-divider"></div>
        <div class="settings-item">
          <button id="export-btn" class="btn-small">导出数据</button>
          <button id="import-btn" class="btn-small">导入数据</button>
          <input type="file" id="import-file-input" accept=".json" class="hidden">
        </div>
        <div class="settings-item settings-item-reset">
          <button id="reset-btn" class="btn-small btn-danger">重置全部</button>
        </div>
      </div>

      <div id="settings-page-clock" class="settings-page">
        <div class="settings-group">
          <div class="settings-item vertical">
            <label>时钟样式</label>
            <div class="preset-row" data-preset-group="clock">
              <button class="preset-btn" data-preset="classic">经典</button>
              <button class="preset-btn" data-preset="glow">发光</button>
              <button class="preset-btn" data-preset="outline">描边</button>
              <button class="preset-btn" data-preset="shadow">阴影</button>
              <button class="preset-btn" data-preset="gradient">渐变</button>
              <button class="preset-btn" data-preset="hologram">全息</button>
              <button class="preset-btn" data-preset="lcd">液晶</button>
              <button class="preset-btn" data-preset="neon">霓虹</button>
            </div>
          </div>
          <div class="settings-item">
            <label>显示时钟</label>
            <div class="toggle-switch" data-key="clock_show" data-default="1">
              <div class="toggle-circular"></div>
            </div>
          </div>
          <div class="settings-item">
            <label>24小时制</label>
            <div class="toggle-switch" data-key="clock_24h" data-default="1">
              <div class="toggle-circular"></div>
            </div>
          </div>
          <div class="settings-item">
            <label>显示秒</label>
            <div class="toggle-switch" data-key="clock_seconds" data-default="0">
              <div class="toggle-circular"></div>
            </div>
          </div>
          <div class="settings-item">
            <label>字号</label>
            <input type="range" data-key="clock_fontsize" data-min="32" data-max="120" data-unit="px" data-default="72">
            <span class="range-value">72px</span>
          </div>
          <div class="settings-item">
            <label>垂直偏移</label>
            <input type="range" data-key="clock_offset" data-min="-150" data-max="150" data-unit="px" data-default="0">
            <span class="range-value">0px</span>
          </div>
        </div>
      </div>

      <div id="settings-page-search" class="settings-page">
        <div class="settings-group">
          <div class="settings-item vertical">
            <label>搜索引擎排序</label>
            <div id="engine-sort-list"></div>
          </div>
          <div class="settings-divider"></div>
          <div class="settings-item vertical">
            <label>搜索框样式</label>
            <div class="preset-row" data-preset-group="search">
              <button class="preset-btn" data-preset="pill">圆润</button>
              <button class="preset-btn" data-preset="glass">毛玻璃</button>
              <button class="preset-btn" data-preset="border">描边</button>
              <button class="preset-btn" data-preset="minimal">极简</button>
              <button class="preset-btn" data-preset="neumorphism">拟态</button>
              <button class="preset-btn" data-preset="spotlight">聚光</button>
              <button class="preset-btn" data-preset="glowborder">流光</button>
              <button class="preset-btn" data-preset="acrylic">亚克力</button>
            </div>
          </div>
          <div class="settings-item">
            <label>宽度</label>
            <input type="range" data-key="search_width" data-min="400" data-max="1000" data-unit="px" data-default="680">
            <span class="range-value">680px</span>
          </div>
          <div class="settings-item">
            <label>高度</label>
            <input type="range" data-key="search_height" data-min="36" data-max="56" data-unit="px" data-default="46">
            <span class="range-value">46px</span>
          </div>
          <div class="settings-item">
            <label>圆角</label>
            <input type="range" data-key="search_radius" data-min="0" data-max="28" data-unit="px" data-default="24">
            <span class="range-value">24px</span>
          </div>
          <div class="settings-item">
            <label>透明度</label>
            <input type="range" data-key="search_opacity" data-min="5" data-max="80" data-unit="%" data-default="12">
            <span class="range-value">12%</span>
          </div>
          <div class="settings-item">
            <label>垂直偏移</label>
            <input type="range" data-key="search_offset" data-min="-150" data-max="150" data-unit="px" data-default="0">
            <span class="range-value">0px</span>
          </div>
        </div>
      </div>

      <div id="settings-page-site" class="settings-page">
        <div class="settings-group">
          <div class="settings-item vertical">
            <label>图标样式</label>
            <div class="preset-row" data-preset-group="site">
              <button class="preset-btn" data-preset="round">圆形</button>
              <button class="preset-btn" data-preset="card">卡片</button>
              <button class="preset-btn" data-preset="outline">描边</button>
              <button class="preset-btn" data-preset="minimal">极简</button>
              <button class="preset-btn" data-preset="squircle">圆滑</button>
              <button class="preset-btn" data-preset="3d">3D</button>
              <button class="preset-btn" data-preset="hoverglow">发光</button>
              <button class="preset-btn" data-preset="neumorphic">拟态</button>
            </div>
          </div>
          <div class="settings-item">
            <label>每行数量</label>
            <input type="range" data-key="site_cols" data-min="0" data-max="15" data-unit="" data-default="0">
            <span class="range-value">自动</span>
          </div>
          <div class="settings-item">
            <label>图标大小</label>
            <input type="range" data-key="site_size" data-min="36" data-max="72" data-unit="px" data-default="60">
            <span class="range-value">60px</span>
          </div>
          <div class="settings-item" id="setting-site_radius">
            <label>图标圆角</label>
            <input type="range" data-key="site_radius" data-min="0" data-max="50" data-unit="%" data-default="27">
            <span class="range-value">27%</span>
          </div>
          <div class="settings-item">
            <label>图标透明度</label>
            <input type="range" data-key="site_opacity" data-min="20" data-max="100" data-unit="%" data-default="100">
            <span class="range-value">100%</span>
          </div>
          <div class="settings-item">
            <label>图标间距</label>
            <input type="range" data-key="site_gap" data-min="8" data-max="36" data-unit="px" data-default="30">
            <span class="range-value">30px</span>
          </div>
          <div class="settings-item">
            <label>搜索与图标间距</label>
            <input type="range" data-key="search_site_gap" data-min="20" data-max="160" data-unit="px" data-default="60">
            <span class="range-value">60px</span>
          </div>
          <div class="settings-item">
            <label>显示名称</label>
            <div class="toggle-switch" data-key="site_showname" data-default="1">
              <div class="toggle-circular"></div>
            </div>
          </div>
          <div class="settings-item">
            <label>新标签打开</label>
            <div class="toggle-switch" data-key="site_newtab" data-default="1">
              <div class="toggle-circular"></div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div id="wallpaper-panel">
    <div id="wallpaper-header">
      <span>壁纸</span>
      <div id="wallpaper-close">&times;</div>
    </div>
    <div id="wallpaper-tabs">
      <div class="wp-tab active" data-tab="gallery">壁纸库</div>
      <div class="wp-tab" data-tab="custom">自定义</div>
    </div>
    <div id="wallpaper-body">
      <div id="wp-tab-gallery" class="wp-tab-content active">
        <div id="gallery-source-switch">
          <button class="gallery-source-btn active" data-source="bing">Bing 每日壁纸</button>
          <button class="gallery-source-btn" data-source="wallhaven">Wallhaven</button>
        </div>
        <div id="wallhaven-categories" class="hidden">
          <button class="wh-cat-btn active" data-cat="111" data-q="">全部</button>
          <button class="wh-cat-btn" data-cat="100" data-q="nature">自然</button>
          <button class="wh-cat-btn" data-cat="100" data-q="city">城市</button>
          <button class="wh-cat-btn" data-cat="100" data-q="abstract">抽象</button>
          <button class="wh-cat-btn" data-cat="010" data-q="">动漫</button>
          <button class="wh-cat-btn" data-cat="001" data-q="">人物</button>
          <button class="wh-cat-btn" data-cat="100" data-q="technology">科技</button>
          <button class="wh-cat-btn" data-cat="100" data-q="animals">动物</button>
          <button class="wh-cat-btn" data-cat="100" data-q="space">太空</button>
          <button class="wh-cat-btn" data-cat="100" data-q="minimalism">极简</button>
        </div>
        <div id="wallpaper-loading">加载中...</div>
        <div id="wallpaper-grid"></div>
        <div id="gallery-load-more" class="hidden">加载更多...</div>
      </div>
      <div id="wp-tab-custom" class="wp-tab-content">
        <div class="settings-group">
          <div class="settings-item vertical">
            <label>壁纸URL</label>
            <div class="input-row">
              <input id="bg-url-input" type="text" placeholder="输入图片网址" value="https://www.bing.com/th?id=OHR.SichuanTea_ZH-CN6703437873_UHD.jpg&rf=LaDigue_UHD.jpg&pid=hp">
              <button id="bg-url-confirm" class="btn-small">确认</button>
            </div>
          </div>
          <div class="settings-item">
            <label>遮罩浓度</label>
            <input type="range" data-key="mask_opacity" data-min="0" data-max="80" data-unit="%" data-default="30">
            <span class="range-value">30%</span>
          </div>
          <div class="settings-item">
            <label>模糊度</label>
            <input type="range" data-key="bg_blur" data-min="0" data-max="20" data-unit="px" data-default="0">
            <span class="range-value">0px</span>
          </div>
          <div class="settings-item vertical">
            <label>适配模式</label>
            <div id="bg-fit-switch">
              <button class="bg-fit-btn active" data-fit="cover">覆盖</button>
              <button class="bg-fit-btn" data-fit="contain">包含</button>
              <button class="bg-fit-btn" data-fit="stretch">拉伸</button>
              <button class="bg-fit-btn" data-fit="tile">平铺</button>
            </div>
          </div>
          <div class="settings-divider"></div>
          <div class="settings-item">
            <button id="bg-url-default" class="btn-small">恢复默认壁纸和设置</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="site-edit-modal">
    <div id="site-edit-box">
      <div class="modal-title" id="site-edit-title">添加快捷方式</div>
      <div class="modal-field">
        <label>名称</label>
        <input id="edit-name" type="text" placeholder="网站名称" maxlength="20">
      </div>
      <div class="modal-field">
        <label>网址</label>
        <input id="edit-url" type="text" placeholder="https://example.com" maxlength="300">
      </div>
      <div class="modal-field">
        <label>图标URL <span class="hint">(留空自动获取)</span></label>
        <input id="edit-icon" type="text" placeholder="留空自动获取favicon">
      </div>
      <div class="modal-actions">
        <button id="edit-cancel" class="btn-cancel">取消</button>
        <button id="edit-confirm" class="btn-confirm">确认</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script type="module" src="js/main.js"></script>
</body>

</html>
