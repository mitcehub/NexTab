name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Package Chrome extension
        run: |
          cd Page
          zip -r ../NexTab-Chrome.zip . -x "*.DS_Store"
          cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: NexTab v${{ steps.version.outputs.VERSION }}
          body: |
            ## NexTab v${{ steps.version.outputs.VERSION }}

            ### 下载安装

            **Chrome / Edge：**
            1. 下载 `NexTab-Chrome.zip` 并解压
            2. 打开 `chrome://extensions/`，开启「开发者模式」
            3. 点击「加载已解压的扩展程序」，选择解压后的文件夹

            **Firefox：**
            前往 [Firefox 附加组件商店](https://addons.mozilla.org/zh-CN/firefox/addon/newnextab/) 安装

            ### 更新内容
            请查看下方 commits 记录
          files: |
            NexTab-Chrome.zip
          draft: false
          prerelease: false
